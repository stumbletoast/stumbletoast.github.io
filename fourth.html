<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tokyo Time Page</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    .scroll-bg {
      position: relative;
      width: 100%;
      min-height: 100vh; 
      background: url('assets/haikei4.png') no-repeat center top;
      background-size: cover;
      background-attachment: fixed; 
      padding-top: 180px; /* 戻るボタンが大きいので余白を少し増やしました */
      padding-bottom: 100px;
    }

    #backButton {
      width: 250px;
      position: fixed;
      top: 80px;
      left: 20px;
      cursor: pointer;
      z-index: 100;
    }

    /* 🔹 画像を並べるコンテナ */
    .object-container {
      display: flex;
      flex-wrap: wrap;       
      justify-content: center; 
      align-items: flex-start;
      gap: 30px;            /* 隙間も少し広げてゆったりさせました */
      padding: 20px;
      max-width: 1400px;    /* 画像が大きくなるので最大幅を広げました */
      margin: 0 auto;       
    }

    /* 🔹 画像の共通設定（リンクなし・少し大きめ） */
    .object {
      width: 250px;        /* ★PCでのサイズを大きくしました */
      height: auto;
      /* リンクではないので cursor: pointer; は削除してもOKですが、
         クリック感を残したい場合はそのままでも大丈夫です */
      
    }

    /* スマホ用調整 */
    @media (max-width: 700px) {
      .scroll-bg {
        padding-top: 130px;
      }

      #backButton {
        width: 160px;
        top: 30px;
        left: 10px;
      }

      /* スマホでは画面幅の約40%（2列並ぶくらい）の大きさに設定 */
      .object {
        width: 42vw; 
        max-width: 200px; /* 大きくなりすぎない上限 */
      }
      
      .object-container {
        gap: 15px; 
      }
    }
  </style>
</head>
