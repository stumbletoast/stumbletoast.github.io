<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Next Page</title>

<style>

body, html{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
}

/* 背景 */
body{
  margin:0;
  background-image:url('assets/haikei.png');
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* 横スクロール禁止 */
html, body{
  overflow-x:hidden;
}

/* ← ここ追加（ボタンのサイズと位置） */
#backButton{
  width: 250px;
  position: fixed;
  top: 80px;
  left: 20px;
  cursor: pointer;
}

/* スマホ調整 */
@media (max-width:600px){

  body{
    background-size:cover;
    background-position:center top;
  }

  html, body{
    overflow:hidden;
  }

  /* スマホだけ少し小さく */
  #backButton{
    width: 160px;
    top: 50px;
    left: -20px;
  }

}

</style>
</head>

<body>

<img id="backButton" src="assets/back.png">

<script>

document.getElementById('backButton').onclick = () => {
  location.href = "index.html";
};

</script>

</body>
</html>
