<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page</title>

<style>
  /* 基本設定：余白をなくし、画面いっぱいに広げる */
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow-x: hidden; /* 横スクロール禁止 */
  }

  /* 🔹 背景：haikei2.png に設定 */
  body {
    background-image: url('/assets/images/haikei2.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed; /* スクロールしても背景を固定 */
  }

  /* 🔹 戻るボタンのスタイル */
  #backButton {
    width: 250px;
    position: fixed;
    top: 80px;
    left: 20px;
    cursor: pointer;
    z-index: 100; /* 他の要素より上に表示 */
  }

  /* 🔹 スマホ用の調整 */
  @media (max-width: 600px) {
    #backButton {
      width: 160px;
      top: 50px;
      left: 10px; /* 見切れないように少し調整 */
    }
    
    body {
      background-position: center top;
    }
  }
</style>
</head>

<body>

  <img id="backButton" src="/assets/images/back.png" alt="戻る">

  <script>
    // 戻るボタンをクリックした時、index（ルート）に戻る
    document.getElementById('backButton').onclick = () => {
      location.href = "/";
    };
  </script>

</body>
</html>
